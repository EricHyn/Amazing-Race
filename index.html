<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Scavenger Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2436;
    --accent: #00e5a0;
    --accent2: #3b82f6;
    --danger: #ff4d6d;
    --text: #e8f0fe;
    --muted: #6b7a99;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80%; height: 80%;
    background: radial-gradient(ellipse, rgba(0,229,160,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -20%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, rgba(59,130,246,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 600px; }
  header { text-align: center; margin-bottom: 2.5rem; }
  .station-badge {
    display: inline-block;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em;
    color: var(--accent); border: 1px solid rgba(0,229,160,0.3);
    padding: 4px 14px; border-radius: 20px; margin-bottom: 1rem; text-transform: uppercase;
  }
  h1 { font-family: var(--mono); font-size: clamp(1.5rem,5vw,2.2rem); font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 14px; color: var(--muted); margin-top: 0.5rem; font-weight: 300; }
  .card { background: var(--surface); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
  .station-image { width: 100%; border-radius: 12px; margin-bottom: 1.5rem; object-fit: cover; max-height: 220px; display: block; border: 1px solid rgba(255,255,255,0.08); }
  .question-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; }
  .question-text { font-size: 17px; line-height: 1.65; font-weight: 400; color: var(--text); }
  .given { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1.2rem; }
  .given-pill { font-family: var(--mono); font-size: 12px; background: var(--surface2); border: 1px solid rgba(59,130,246,0.25); color: #93c5fd; padding: 4px 12px; border-radius: 8px; }
  .input-row { display: flex; gap: 10px; margin-top: 1.5rem; align-items: stretch; }
  input[type="text"] {
    flex: 1; background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 0 1rem; font-family: var(--mono); font-size: 14px; color: var(--text); outline: none;
    transition: border-color 0.2s; height: 48px;
  }
  input[type="text"]:focus { border-color: rgba(0,229,160,0.5); }
  input[type="text"].shake { animation: shake 0.4s ease; border-color: var(--danger); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  button {
    background: var(--accent); color: #0a0f1e; border: none; border-radius: 10px;
    padding: 0 1.4rem; font-family: var(--mono); font-size: 13px; font-weight: 700;
    cursor: pointer; height: 48px; transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  .feedback { margin-top: 1rem; font-family: var(--mono); font-size: 13px; min-height: 20px; }
  .feedback.error { color: var(--danger); }
  .feedback.ok { color: var(--accent); }
  .hint-card {
    background: linear-gradient(135deg, rgba(0,229,160,0.08), rgba(59,130,246,0.08));
    border: 1px solid rgba(0,229,160,0.3); border-radius: 16px; padding: 2rem;
    margin-top: 1rem; display: none; animation: fadeUp 0.4s ease;
  }
  .hint-card.visible { display: block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .hint-label {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px;
  }
  .hint-label::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  .hint-text { font-size: 18px; font-weight: 500; line-height: 1.5; }
  .station-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 2rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); transition: background 0.3s; }
  .dot.active { background: var(--accent); border-color: var(--accent); }
  .error-page { text-align: center; padding: 4rem 1rem; }
  .error-page h2 { font-family: var(--mono); font-size: 1.5rem; color: var(--danger); margin-bottom: 1rem; }
  .error-page p { color: var(--muted); }
  .image-credit { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 1.5rem; opacity: 0.6; }
</style>
</head>
<body>
<div class="wrap">
<div class="station-dots" id="dots"></div>
<header>
  <div class="station-badge" id="station-badge">Loading...</div>
  <h1>Physics <span>Scavenger Hunt</span></h1>
  <p class="subtitle">Solve the question to reveal your next location.</p>
</header>
<div id="main-content"></div>
</div>

  {

    given: ["F = 20 N", "m = 5.0 kg", "Frictionless surface"],
    answers: ["4 m/s2", "4.0 m/s2", "4 m/s^2", "4.0 m/s^2"],
    hint: "Head to where students swing for the fences — look at home plate on the softball diamond.",
    image: null
  },
  {
    question: "A 10 kg object has a weight of 98 N on Earth. What is the gravitational field strength used?",
    given: ["m = 10 kg", "Fw = 98 N"],

    hint: "Find the room where every school day begins — check the board at the front of Room 107.",

  },
  {

  },

function getStation() {
  const params = new URLSearchParams(window.location.search);
  const s = parseInt(params.get("station"));
  if (!s || s < 1 || s > stations.length) return null;
  return s;
}

function normalize(str) {
  return str.toLowerCase()
    .replace(/\s+/g, " ")
    .replace(/m\/s\^2/g, "m/s2")
    .replace(/m\/s2/g, "m/s2")
    .replace(/\u00d7/g, "x")
    .trim();
}

function buildDots(current) {
  const container = document.getElementById("dots");
  for (let i = 1; i <= stations.length; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i === current ? " active" : "");
    container.appendChild(d);
  }
}

function render() {
  const stationNum = getStation();
  const content = document.getElementById("main-content");
  if (!stationNum) {
    document.getElementById("station-badge").textContent = "Error";
    content.innerHTML = `<div class="error-page"><h2>Invalid station</h2><p>Scan the correct QR code.<br>URL should end in <code>?station=1</code> through <code>?station=7</code>.</p></div>`;
    return;
  }
  const data = stations[stationNum - 1];
  buildDots(stationNum);
  document.getElementById("station-badge").textContent = `Station ${stationNum} of ${stations.length}`;
  const isLast = stationNum === stations.length;
  const imgSrc = data.image || PLACEHOLDER_IMG;
  const givenPills = data.given.map(g => `<span class="given-pill">${g}</span>`).join("");

  content.innerHTML = `
    <div class="card">
      <img class="station-image" src="${imgSrc}" alt="Station ${stationNum} image" />
      <p class="image-credit">Replace this image per station — see setup guide</p>
      <div class="question-label">Question ${stationNum}</div>
      <p class="question-text">${data.question}</p>
      <div class="given">${givenPills}</div>
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="Type your answer\u2026" autocomplete="off" />
        <button onclick="checkAnswer()">Submit</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="hint-card" id="hint-card">
      <div class="hint-label">${isLast ? "You did it!" : "Next location"}</div>
      <div class="hint-text">${data.hint}</div>
    </div>
  `;
  document.getElementById("answer-input").addEventListener("keydown", e => {
    if (e.key === "Enter") checkAnswer();
  });
}

function checkAnswer() {
  const stationNum = getStation();
  const data = stations[stationNum - 1];
  const input = document.getElementById("answer-input");
  const feedback = document.getElementById("feedback");
  const hintCard = document.getElementById("hint-card");
  const userAnswer = normalize(input.value);
  if (!userAnswer) return;
  const correct = data.answers.some(a => normalize(a) === userAnswer);
  if (correct) {
    feedback.textContent = "\u2713 Correct!";
    feedback.className = "feedback ok";
    hintCard.classList.add("visible");
    input.disabled = true;
  } else {
    feedback.textContent = "\u2717 Not quite \u2014 check your work and try again.";
    feedback.className = "feedback error";
    input.classList.remove("shake");
    void input.offsetWidth;
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 400);
  }
}

render();
</script>
